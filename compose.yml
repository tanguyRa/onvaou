services:
  # ============================================
  # Postgres (local dev/testing)
  # ============================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: ${PROJECT_NAME}-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=\"${POSTGRES_PASSWORD}\" psql -U \"${POSTGRES_USER}\" -d \"${POSTGRES_DB}\" -tAc 'SELECT PostGIS_Version()' >/dev/null",
        ]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 2s

  # ============================================
  # Go API Backend
  # ============================================
  back:
    image: ${PROJECT_NAME}-back:${DOCKER_TAG:-dev}
    pull_policy: missing
    container_name: ${PROJECT_NAME}-back
    build:
      context: ./back
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-production}
      args:
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-amd64}
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - PROJECT_NAME=${PROJECT_NAME}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      # Auth
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      #  Payments
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-polar}
      - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      # Storage
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-bucket}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL:-http://127.0.0.1:9000/bucket}
      # Front<->back security
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./back:/app
      - ./db:/db
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # Python Geo-Service
  # ============================================
  geo:
    image: ${PROJECT_NAME}-geo:${DOCKER_TAG:-dev}
    pull_policy: missing
    container_name: ${PROJECT_NAME}-geo
    build:
      context: ./geo
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - BAN_API_URL=${BAN_API_URL:-https://api-adresse.data.gouv.fr}
      - OPENAGENDA_API_KEY=${OPENAGENDA_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./geo:/app
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # SvelteKit Frontend
  # ============================================
  front:
    image: ${PROJECT_NAME}-front:${DOCKER_TAG:-dev}
    pull_policy: missing
    container_name: ${PROJECT_NAME}-front
    build:
      context: ./front
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-production}
    ports:
      - "3000:5173"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - ORIGIN=${ORIGIN:-http://127.0.0.1:3000}
      - GO_API_URL=${GO_API_URL:-http://${PROJECT_NAME}-back:8080}
      - GEO_API_URL=${GEO_API_URL:-http://${PROJECT_NAME}-geo:8000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      # Payments
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER}
      - PUBLIC_PAYMENT_PROVIDER=${PAYMENT_PROVIDER}
      - PAYMENT_SUCCESS_URL=${PAYMENT_SUCCESS_URL}
      - PAYMENT_CANCEL_URL=${PAYMENT_CANCEL_URL}

      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}
      - POLAR_SERVER=${POLAR_SERVER:-sandbox}
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.svelte-kit
    depends_on:
      - back
      - geo
